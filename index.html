<!DOCTYPE html>

<head>
<meta charset="utf-8" />

<title>MaterialAnzeige</title>
<style>
/* Grundlayout / Farben (pergament / braun) */
body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background: #f7efe0;
  color: #4b3f2f;
  padding: 12px;
}
.wrapper { max-width: 980px; margin: 0 auto; }

/* Suchfeld */
input[type="text"]{
  width:100%;
  padding:8px;
  margin:6px 0 12px 0;
  border-radius:6px;
  border:1px solid #d7c4a3;
  background:#fff8f0;
  box-sizing:border-box;
  font-size:1rem;
}
input[type="text"]:focus{
  outline:none;
  border:2px solid #a57c52;  /* brauner Rahmen beim Fokus */
  padding:7px;               /* kompensiert die Border so die Größe gleich bleibt */
  box-sizing:border-box;
}

/* Erweiterungs-Checkboxen */
.checkbox-group { margin-bottom:12px; }
.checkbox-group-name { font-weight:600; color:#5d4037; margin-bottom:6px; }
.checkbox-inline {
  display:inline-block;
  margin-right:8px;
  padding:4px 6px;
  border-radius:6px;
  background:#fbf4e6;
  cursor:pointer;
  color:#4b3f2f;
}
.checkbox-inline input[type="button"] { font-family: inherit !important; width: 4.25em; }
.checkbox-inline input[type="checkbox"] { accent-color:#a57c52; margin-right:6px; }

/* Tabelle */
table {
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:#fff8f0;
  border:2px solid #a57c52;
  border-radius:8px 8px 0 0;
  overflow:scroll;
  display:block;
}
thead th {
  position:sticky;
  top:0;
  background:#a57c52;
  color:white;
  padding:10px 12px;
  text-align:center;
  font-weight:600;
  border-bottom:2px solid #a57c52;
}
thead th:first-child {
  cursor: pointer;
}
tbody td, thead th { padding:8px 12px; border-bottom:1px solid #e8dcc1; text-align:center; } 
tbody td:first-child, thead th:first-child { text-align:left; width:100%; }
tbody td.distinct::after { content:"*"; }
tbody td.distinct::before { content:"*"; color:transparent; }
tbody tr:nth-child(even) { background:#fbf3e9; }
#material-table tbody tr:hover { background:#f0e0c8; } /* gesamte Zeile beim Hover */
.category { font-weight:700; cursor:pointer; }
.item-row { }

#overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(75,63,47,0.45);
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#overlay-content {
  background:#fff8f0;
  padding:18px;
  border-radius:10px;
  width:min(680px,95%);
  max-height:90%;
  overflow:auto;
  position:relative;
  box-shadow:0 8px 28px rgba(75,63,47,0.25);
}
#overlay-close { position:absolute; top:10px; right:10px; background:none; border:0; font-size:18px; color:#5d4037; cursor:pointer; }
#overlay img { max-width:100%; height:30vh; max-height:60vw; object-fit:contain; display:block; margin:8px auto; border-radius:6px; padding:0, .5em; box-sizing:border-box; }
.nav-btn { position:absolute; top:50%; transform:translateY(-50%); background:none; border:0; font-size:24px; cursor:pointer; color:#a57c52; }
.nav-left { left:12px; } .nav-right { right:12px; }
#overlay table { width:100%; margin-top:10px; border:1px solid #e5d7b7; border-radius:6px; overflow:hidden; }
#overlay table th { background:#e0cfa1; color:#4b3f2f; padding:6px 8px; text-align:left; }
#overlay table td { background:#fdf1dc; padding:6px 8px; }
</style>
</head>
<body>
<div class="wrapper">
  <div id="expansions"></div>
  <input id="search" type="text" placeholder="Suche ..." />
  <table id="material-table" role="table" aria-label="Materialkatalog">
    <thead><tr id="table-head-row"></tr></thead>
    <tbody id="material-body"></tbody>
  </table>
</div>

<!-- Overlay für Einzelteil -->

      <button class="nav-btn nav-right">▶</button>
      <div id="overlay-caption" style="text-align:center; color:#5d4037; margin-top:6px;"></div>

    <table id="overlay-props" style="margin-top:10px;"></table>

function inflectColor (color, suffix) {
  if (["rosa"].includes(color)) {
    return color + " ";
  }
  return color + (color.endsWith("e") ? "" : "e") + suffix + " ";
}

function removeUmlauts (name) {
  name = name.replaceAll("ä", "ae").replaceAll("ö", "oe").replaceAll("ü", "ue").replaceAll("ß", "ss");
  name = name.replaceAll(" ", "_").replaceAll("/", "_").replaceAll("„", "").replaceAll("“", "").replaceAll("(", "").replaceAll(")", "").replaceAll(".", "").replaceAll(":", "").replaceAll(",", "").replaceAll("+", "").replaceAll("'", "").replaceAll(" – ", " ");
  return name;
}

400% Zoom

function customItem (args, customArgs) {
    const item = {
    id: "",
    name: "",
    alt: [],
    counts: {},
    images: {},
    properties: {},
  }
  Object.keys(item).forEach(key => {
    if (key !== "images") {
      if (customArgs.hasOwnProperty(key)) {
        item[key] = customArgs[key];
      }
      if (args.hasOwnProperty(key)) {
        item[key] = args[key];
      }
    }
  });
  Object.keys(item.counts).forEach(key => {
    item.images[key] = { src: noImage, caption: item.name, };
    if (customArgs.hasOwnProperty("images") && customArgs.images.hasOwnProperty(key)) {
      Object.keys(customArgs.images[key]).forEach(k => {
        item.images[key][k] = customArgs.images[key][k];
      });
    }
    if (args.hasOwnProperty("images") && args.images.hasOwnProperty(key)) {
      Object.keys(args.images[key]).forEach(k => {
        item.images[key][k] = args.images[key][k];
      });
    }
  });
  return item;
}

const items = [];
function expandItems (item, category=[]) {
  if (Array.isArray(item)) {
    item.forEach(it => {
      it.category = category.slice(0);
      items.push(it);
    });
  }
  else {
    for (const [key, value] of Object.entries(item)) {
      if (key !== ""){
        category.push(key);
      }
      expandItems(value, category);
      if (key !== ""){
        category.pop();
      }
    }
  }
}
expandItems(nestedItems);

// ==================== counts parsen und distinct hinzufügen ====================
items.forEach(item => {
  item.distinct = {};
  for (const key in item.counts) {
    const val = item.counts[key];
    if (typeof val === "string") {
      if (val.includes("*")) item.distinct[key] = true;
      item.counts[key] = parseInt(val.replace(/\*/g, ""), 10);
    }
  }
});

// ==================== Erweiterungen UI ====================
function buildExpansionCheckboxes(){
  const container = document.getElementById("expansions");
  container.innerHTML = "";
  const groups = {};
  expansions.forEach(e => { if(!groups[e.group]) groups[e.group] = []; groups[e.group].push(e); });

  for (const groupName of Object.keys(groups)) {
    const div = document.createElement("div");
    div.className = "checkbox-group";
    const label = document.createElement("div");
    label.className = "checkbox-group-name";
    label.textContent = groupName + ":";
    div.appendChild(label);

    const lab = document.createElement("label");
    lab.className = "checkbox-inline";
    const cb = document.createElement("input");
    cb.type = "button";
    cb.value = "alle aus";
    cb.addEventListener("click", (e) => {
      e.currentTarget.value = "alle " + (e.currentTarget.value == "alle ein" ? "aus" : "ein");
      Array.from(e.currentTarget.parentElement.parentElement.querySelectorAll("input[type=checkbox]")).forEach(input => {
        input.checked = (e.currentTarget.value == "alle aus");
      });
      renderTable();
    });
    lab.appendChild(cb);
    div.appendChild(lab);

    groups[groupName].forEach(exp => {
      const lab = document.createElement("label");
      lab.className = "checkbox-inline";
      lab.title = exp.name;
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = true;
      cb.dataset.code = exp.code;
      cb.addEventListener("change", renderTable);
      lab.appendChild(cb);
      lab.appendChild(document.createTextNode(` ${codeMap[exp.code]} (${exp.year == Number.MAX_VALUE ? "–" : exp.year})`));
      div.appendChild(lab);
    });

    container.appendChild(div);
  }
}

// ==================== Baum / Tabelle aufbauen ====================
function buildCategoryStructure(filteredItems){
  const root = {};
  filteredItems.forEach(item => {
    let node = root;
    item.category.forEach(cat => {
      if (!node[cat]) node[cat] = { __items: [] };
      node = node[cat];
    });
    node.__items.push(item);
  });
  return root;
}

// calcCategorySums berechnet _sums und _distinctFlags rekursiv
function calcCategorySums(node, enabledExp){
  const sums = {};
  const distinctFlags = {};
  enabledExp.forEach(c => { sums[c] = 0; distinctFlags[c] = false; });

  (node.__items || []).forEach(item => {
    enabledExp.forEach(c => {
      const v = item.counts[c] ?? 0;
      sums[c] += v;
      if (item.distinct[c]) distinctFlags[c] = true;
    });
  });

  for (const k in node) {
    if (k === "__items") continue;
    const child = node[k];
    const cs = calcCategorySums(child, enabledExp);
    enabledExp.forEach(c => {
      sums[c] += cs.sums[c];
      if (cs.distinctFlags[c]) distinctFlags[c] = true;
    });
  }

  node._sums = sums;
  node._distinctFlags = distinctFlags;
  return { sums, distinctFlags };
}

/*
 buildTree:
 - erzeugt <tr> Reihen als flaches Array (Kategoriezeile, dann alle Kinderzeilen)
 - setzt dataset.path für jede Zeile (Kategoriezeilen: "A|B", Itemzeilen: "A|B|itemid")
 - setzt tr._node = nodeObj für Kategoriezeilen (wichtig für updateCategoryCells)
*/
function buildTree(obj, level = 0, parentId = "root", enabledExp = [], parentPath = []){
  const rows = [];
  for (const category in obj) {
    if (category === "__items") continue;

    const thisPathArr = parentPath.concat(category);
    const thisPath = thisPathArr.join("|");

    // rekursiv Kinder aufbauen
    const childRows = buildTree(obj[category], level + 1, category, enabledExp, thisPathArr);

    // sichtbare Einzelteile (filtered by enabledExp)
    const visibleItems = (obj[category].__items || []).filter(item => enabledExp.some(c => Number.isNaN(item.counts[c]) || ((item.counts[c] ?? 0) > 0)));
    if (childRows.length === 0 && visibleItems.length === 0) continue;

    // Kategoriezeile
    const trCat = document.createElement("tr");
    const tdCat = document.createElement("td");
    tdCat.textContent = category;
    tdCat.className = "category";
    tdCat.style.paddingLeft = ((level > 0 ? level : 0) * 12 + 12) + "px";
    tdCat.onclick = () => toggleCategoryRows(trCat);
    trCat.appendChild(tdCat);

    // setze path und collapsed-flag (default ausgeklappt = false)
    trCat.dataset.path = thisPath;
    trCat.dataset.collapsed = "false";
    trCat.dataset.level = String(level);
    trCat.dataset.parent = parentId;

    // leere Zellen für die Spalten (werden später durch updateCategoryCells gefüllt)
    enabledExp.forEach(_ => {
      const td = document.createElement("td");
      td.classList.remove("distinct");
      td.textContent = ""; td.style.cursor = "default";
      trCat.appendChild(td);
    });

    // referenz auf Node für späteres Auslesen
    trCat._node = obj[category];

    rows.push(trCat);

    // unterkategorien
    childRows.forEach(r => rows.push(r));

    // sichtbare Einzelteile
    visibleItems.forEach(item => {
      const trItem = document.createElement("tr");
      const tdItem = document.createElement("td");
      tdItem.textContent = item.name;
      tdItem.className = "item-row";
      tdItem.style.paddingLeft = ((level + 1) * 12 + 12) + "px";
      trItem.appendChild(tdItem);

      // item path (Kategorie-Pfad + item id)
      trItem.dataset.path = thisPathArr.concat(item.id || item.name).join("|");
      trItem.dataset.level = String(level + 1);
      trItem.dataset.parent = category;

      enabledExp.forEach(code => {
        const val = item.counts[code] ?? 0;
        const td = document.createElement("td");
        if(item.distinct[code]){
          td.classList.add("distinct");
        }
        td.textContent = (Number.isNaN(val) ? "?" : (val > 0 ? val : "–"));
        td.style.cursor = (Number.isNaN(val) || val > 0) ? "pointer" : "default";
        td.onclick = (e) => { if (Number.isNaN(val) || val > 0) { e.stopPropagation(); showOverlay(item, code); } };
        trItem.appendChild(td);
      });

      rows.push(trItem);
    });
    
    rows.sort((a, b) => {
      function getName (x) {
        dataPath = x.getAttribute("data-path").split("|");
        dataPath[dataPath.length-1] = x.querySelector("td").textContent;
        return dataPath.join("|").replaceAll("„", "").replaceAll("“", "").replaceAll("(", "").replaceAll(")", "") + (x.getAttribute("data-collapsed") ? " " : "");
      }
      return getName(a).localeCompare(getName(b), undefined, {numeric: true, sensitivity: 'base'});
    });
  }

  return rows;
}

// ==================== robustes Ein-/Ausklapp-Verhalten ====================
function toggleCategoryRows(tr){
  const tbody = document.getElementById("material-body");
  const clickedPath = tr.dataset.path;
  if (!clickedPath) return;
  const prefix = clickedPath + "|";
  const collapsed = tr.dataset.collapsed === "true";
  const newCollapsed = !collapsed;
  tr.dataset.collapsed = newCollapsed ? "true" : "false";

  if (newCollapsed) {
    // EINKLAPPEN: Alle Nachkommen verstecken
    for (const r of Array.from(tbody.children)) {
      const rp = r.dataset.path || "";
      if (rp.startsWith(prefix)) {
        r.hidden = true;
        r.dataset.collapsed = "true";
      }
    }
  } else {
    // AUSKLAPPEN: Nur direkte Kinder sichtbar machen (tiefer liegende bleiben verborgen,
    // es sei denn, ihre eigene Kategorie ist expanded)
    const clickedLevel = clickedPath.split("|").length;
    for (const r of Array.from(tbody.children)) {
      const rp = r.dataset.path || "";
      if (!rp.startsWith(prefix)) continue;
      const level = rp.split("|").length;
      if (level === clickedLevel + 1) {
        // direktes Kind: sichtbar machen
        r.hidden = false;
        // wenn das Kind eine Kategorie ist und collapsed="true", seine Nachkommen bleiben versteckt
        // (wir tun hier nichts weiter)
      } else {
        // tiefer liegende Nachkommen bleiben unverändert (meist versteckt)
      }
    }
  }

  // Nach dem Umschalten die Kategoriezellen aktualisieren
  updateCategoryCells();
}

// Diese Funktion füllt Kategorie-Zellen so, dass nur die unterste sichtbare Ebene Zahlen zeigt.
// Sie benutzt tr._node (gesetzt in buildTree) und die Reihenfolge enabledExpSorted (Headers).
function updateCategoryCells(){
  const tbody = document.getElementById("material-body");
  const enabledExpSorted = getEnabledExpSorted(); // array of codes in header order

  // Durchlauf aller Zeilen; bei Kategoriezeilen füllen/clearen wir die Zellen
  const rows = Array.from(tbody.children);
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const firstCell = row.querySelector("td");
    if (!firstCell || !firstCell.classList.contains("category")) continue;

    // Prüfe, ob es sichtbare Unterkategorien gibt (also sichtbare Zeilen innerhalb des Subtrees mit level > thisLevel)
    const thisPath = row.dataset.path || "";
    const prefix = thisPath + "|";
    let hasVisibleSub = false;

    // Suche nach Zeilen innerhalb des Subtree, die direkt oder indirekt Nachkommen sind
    let itemCount = [0];
    for (let j = i + 1; j < rows.length; j++) {
      const r = rows[j];
      const rp = r.dataset.path || "";
      if (!rp.startsWith(prefix)) break; // außerhalb Subtree
      if (!r.hidden) {
        // wenn ein sichtbarer Nachkomme erreicht wird, dann hat diese Kategorie sichtbare Unterkategorien
        // (kann eine Kategorie oder ein Item sein)
        const relLevel = rp.split("|").length - thisPath.split("|").length;
        if (relLevel >= 1) { hasVisibleSub = true; }
      }
      if (!r.querySelector("td").classList.contains("category")) {
        const tds = Array.from(r.querySelectorAll("td"));
        for (let colIdx = 1; colIdx < tds.length; ++colIdx) {
          while (itemCount.length <= colIdx) itemCount.push(0);
          const c = (tds[colIdx].textContent == "–" ? 0 : Math.min(1, parseInt(tds[colIdx].textContent)));
          itemCount[colIdx] += c;
        }
      }
    }

    // Fülle / leere die tds der Kategorie-Zeile
    const tds = row.querySelectorAll("td");
    // tds[0] ist die Kategorie-Beschriftung
    for (let colIdx = 1; colIdx < tds.length; colIdx++) {
      tds[colIdx].classList.remove("distinct");
      const code = enabledExpSorted[colIdx - 1];
      if (!hasVisibleSub) {
        // unterste sichtbare Ebene -> zeige Summe (aus node._sums)
        const node = row._node;
        if (node && node._sums) {
          const num = node._sums[code] ?? 0;
          if((node._distinctFlags && node._distinctFlags[code]) || (itemCount[colIdx] > 1 && num > 0)){
            tds[colIdx].classList.add("distinct");
          }
          tds[colIdx].textContent = (Number.isNaN(num) ? "?" : (num > 0 ? num : "–"));
        } else {
          tds[colIdx].textContent = "–";
        }
      } else {
        // hat sichtbare Unterkategorien -> leer
        tds[colIdx].textContent = "";
      }
    }
  }
}

// Hilfsfunktion: welche Erweiterungen sind aktiviert, in der Kopfzeilen-Jahres-Sortierung?
function getEnabledExpSorted(){
  const checkedCodes = Array.from(document.querySelectorAll('#expansions input[type="checkbox"]'))
    .filter(cb => cb.checked)
    .map(cb => cb.dataset.code);
  // sortiere die expansions nach Jahr, filtere nach checkedCodes
  return expansions.slice()
    .filter(e => checkedCodes.includes(e.code))
    .sort((a,b)=>(a.year == b.year ? a.code.localeCompare(b.code) : a.year - b.year))
    .map(e=>e.code);
}

// ==================== Overlay ====================
let currentImages = [];
let currentIndex = 0;
function showOverlay(item, codeClicked){
  const overlay = document.getElementById("overlay");
  document.getElementById("overlay-path").textContent = item.category.join(" > ");
  document.getElementById("overlay-name").textContent = item.name;
  document.getElementById("overlay-alt").innerHTML = (item.alt || []).join(", ");

  currentImages = [];
  for (const exp in item.images) {
    if (getEnabledExpSorted().includes(exp)) {
      currentImages.push({ exp, src: item.images[exp].src, caption: "<i>" + item.images[exp].caption + "</i><br/>aus „" + expansions.filter(expansion => expansion.code == exp)[0].name + "“" });
    }
  }
  currentImages.sort((a, b) => {
    a = expansions.filter(expansion => expansion.code == a.exp)[0].year;
    b = expansions.filter(expansion => expansion.code == b.exp)[0].year;
    return a - b;
  });
  // finde Index des Bildes für die geklickte Erweiterung (codeClicked)
  const idx = currentImages.findIndex(x => x.exp === codeClicked);
  currentIndex = idx >= 0 ? idx : 0;
  updateOverlayImage();

  // Eigenschaften-Tabelle
  const table = document.getElementById("overlay-props");
  table.innerHTML = "";
  for (const k in item.properties) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<th>${k}</th><td>${item.properties[k]}</td>`;
    table.appendChild(tr);
  }

  overlay.style.display = "flex";
}
function updateOverlayImage(){
  const img = document.getElementById("overlay-img");
  const caption = document.getElementById("overlay-caption");
  const btnLeft = document.querySelector(".nav-left");
  const btnRight = document.querySelector(".nav-right");
  if (!currentImages.length) { img.src = ""; caption.textContent = ""; btnLeft.style.display = "none"; btnRight.style.display = "none"; return; }
  img.src = currentImages[currentIndex].src;
  caption.innerHTML = currentImages[currentIndex].caption;
  btnLeft.style.display = currentIndex > 0 ? "block" : "none";
  btnRight.style.display = currentIndex < currentImages.length - 1 ? "block" : "none";
}
document.getElementById("overlay-close").onclick = () => { document.getElementById("overlay").style.display = "none"; };
document.getElementById("overlay").onclick = (e) => { if (e.target.id === "overlay") e.target.style.display = "none"; };
document.querySelector(".nav-left").onclick = () => { if (currentIndex > 0) { currentIndex--; updateOverlayImage(); } };
document.querySelector(".nav-right").onclick = () => { if (currentIndex < currentImages.length - 1) { currentIndex++; updateOverlayImage(); } };

// ==================== Render / Initialisierung ====================
function renderTable(){
  const tbody = document.getElementById("material-body");
  tbody.innerHTML = "";

  // enabledExpSorted: codes in the same order as the header (sorted by year)
  const enabledExpSorted = getEnabledExpSorted();

  // Kopfzeile bauen
  const headRow = document.getElementById("table-head-row");
  headRow.innerHTML = "";
  const thName = document.createElement("th"); thName.textContent = "Spielmaterial";
  thName.onclick = function () {
    document.querySelectorAll('[data-level="0"]').forEach(elem => {
      if (elem.getAttribute("data-collapsed") == "false") {
        elem.querySelector("td").click();
      }
    });
  }
  headRow.appendChild(thName);
  // Spalten pro Erweiterung (Jahres-sortiert)
  expansions.slice().filter(e => enabledExpSorted.includes(e.code))
    .sort((a,b)=>(a.year == b.year ? a.code.localeCompare(b.code) : a.year - b.year))
    .forEach(exp => {
      const th = document.createElement("th");
      th.textContent = `${codeMap[exp.code]} (${exp.year == Number.MAX_VALUE ? "–" : exp.year})`;
      th.title = exp.name;
      headRow.appendChild(th);
    });

  // Items filtern (Search + only items that appear in any enabled expansion)
  const search = removeUmlauts(document.getElementById("search").value.trim()).toLowerCase().replaceAll("-", "");
  const enabledSet = new Set(enabledExpSorted);
  const filteredItems = items.filter(it => {
    const appears = Array.from(enabledSet).some(code => Number.isNaN(it.counts[code]) || ((it.counts[code] ?? 0) > 0));
    const matchesSearch = search === "" || [it.name].concat(it.alt || []).concat(it.category || []).some(a => removeUmlauts(a).toLowerCase().replaceAll("-", "").includes(search));
    return appears && matchesSearch;
  });

  // Baumstruktur und Summen berechnen
  const tree = buildCategoryStructure(filteredItems);
  calcCategorySums(tree, enabledExpSorted);

  // rows bauen (pass enabledExpSorted so columns match header)
  const rows = buildTree(tree, 0, "root", enabledExpSorted, []);
  rows.forEach(r => tbody.appendChild(r));

  // initial: alle Zeilen sichtbar -> ensure collapsed flags are "false"
  Array.from(tbody.children).forEach(r => {
    if (r.dataset && typeof r.dataset.collapsed === "undefined") r.dataset.collapsed = "false";
    r.hidden = false;
  });

  // Jetzt Kategoriezellen füllen, sodass nur unterste sichtbare Ebene Zahlen hat
  updateCategoryCells();
}

// initial UI bauen
buildExpansionCheckboxes();
document.getElementById("search").addEventListener("input", renderTable);

// initial render
renderTable();
